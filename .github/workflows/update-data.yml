name: Codzienna Aktualizacja Bazy Umamusume

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalacja zależności
        run: npm install --legacy-peer-deps

      # Krok z automatyczną pętlą ponawiania prób i wymiany maszyn/IP
      - name: Uruchomienie skryptu aktualizacji (z obsługą pętli i IP)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2      # Maksymalny czas na jedną pojedynczą próbę
          max_attempts: 5         # W przypadku blokady IP, spróbuj maksymalnie 5 razy pod rząd
          retry_wait_seconds: 180 # Odczekaj 3 minuty przed kolejną próbą (czas na zmianę maszyny i IP)
          command: node src/data/database_update.js

      - name: Sprawdzenie zmian i commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/umas.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatyczna aktualizacja bazy postaci" && git push)